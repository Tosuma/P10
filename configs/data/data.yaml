# Data pipeline configuration
# All paths are relative to the project root by default.
# Override with absolute paths or SLURM env vars.

rgb_dir: "data/RGB"
ms_dir:  "data/Multispectral"

# Band suffixes — adjust if your sensor uses different naming
ms_suffixes: ["_G", "_R", "_RE", "_NIR"]

# Whether to prepend RGB as the first 3 channels
include_rgb: true

# Append NDVI, NDRE, SAVI, EVI as extra channels
include_indices: true

# Input channels: 3 (RGB) + 4 (MS) + 4 (indices) = 11
# Set manually if you disable RGB or indices
in_channels: 11

patch_size: 128
patches_per_image: 32      # Random patches per image per epoch (training)
stride: 64                 # Overlap stride for inference-mode dense tiling

val_fraction: 0.2
seed: 42

# DataLoader
batch_size: 64
num_workers: 8
cache_images: false        # Set true on HPC with large RAM nodes