# Stage 1: MAE Pretraining configuration

defaults:
  - data: data
  - _self_

mae:
  # Model
  arch: "vit_small_patch16"   # Options: vit_tiny_patch16, vit_small_patch16, vit_base_patch16
  patch_size: 16              # ViT internal patch size (NOT the crop patch size)
  masking_ratio: 0.75         # 75% masking — optimal per He et al. 2022
  decoder_embed_dim: 512
  decoder_depth: 4
  decoder_num_heads: 8

  # Spectral attention
  sa_reduction_ratio: 4       # SE-Net bottleneck ratio

  # Gradient checkpointing (set true for ViT-Base on 16GB GPUs)
  use_checkpoint: true

  # Training
  epochs: 200
  base_lr: 1.5e-4             # Scales with effective batch size: lr = 1.5e-4 * batch/256
  weight_decay: 0.05
  warmup_epochs: 40
  grad_clip: 1.0
  save_every: 10
  early_stop_patience: 30     # 0 = disabled

  # Logging
  use_wandb: true
  wandb_project: "plant-stress-mae"

  # Output
  output_dir: "outputs/stage1_mae"
